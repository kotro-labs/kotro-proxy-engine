name: Cancel-storm leak audit

# Verifies zero goroutine leak (Go) and zero OS-thread leak (Rust) after a
# k6-driven mass mid-stream client-disconnect storm. Runs `make audit`,
# which sequences benchmarks/run_audit.sh (Go, pprof-based) and
# benchmarks/run_rust_audit.sh (Rust, OS thread/RSS-based) -- the same
# entrypoint documented in the README, previously local-only with no CI
# gate. See docs/roadmap/next-steps.md P1.
#
# Kept as a separate, non-blocking workflow rather than folded into the
# required ci.yml test job: this is a ~1-2 minute k6-driven load test per
# binary, not a fast unit-test gate, and this is its first run in GitHub
# Actions -- the Rust half's thread-counting previously used a macOS-only
# `ps -M` and would not have worked here before the Linux /proc/<pid>/status
# fallback added alongside this workflow. Promote to a required check on
# ci.yml once it's proven stable across a few real runs here.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * *' # daily, 9am UTC
  workflow_dispatch: {}

jobs:
  cancel-audit:
    name: Go + Rust cancel-storm leak audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | gpg --dearmor | sudo tee /usr/share/keyrings/k6-archive-keyring.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Cancel-storm leak audit (Go + Rust, sequential -- they share :8080/:9000)
        run: make audit

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cancel-audit-logs
          path: benchmarks/.audit-logs/
          if-no-files-found: ignore
